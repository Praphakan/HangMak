<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HangMak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { background: #0e0d0a; color: #d8c898; font-family: 'IBM Plex Mono', monospace; }
.root { padding: 1.4rem 1.1rem 2.5rem; max-width: 680px; margin: 0 auto; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; margin-bottom: 1.2rem; border-bottom: 1px solid #42391f; gap: .6rem; }
.logo { font-family: 'Teko', sans-serif; font-size: clamp(2rem, 7vw, 2.6rem); font-weight: 600; letter-spacing: .06em; color: #f0c060; text-transform: uppercase; line-height: 1; }
.logo em { color: #c8881a; font-style: normal; }
.sub { font-size: clamp(.6rem, 2vw, .68rem); letter-spacing: .16em; text-transform: uppercase; color: #5a5030; font-weight: 300; margin-top: .25rem; }
.cam-btn { flex-shrink: 0; background: #181610; border: 1px solid #42391f; border-radius: 5px; padding: .65rem 1rem; color: #c8881a; font-family: 'IBM Plex Mono', monospace; font-size: clamp(.68rem, 2.2vw, .78rem); font-weight: 400; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: .45rem; white-space: nowrap; }
.cam-btn.on { background: #c8881a; color: #0e0d0a; border-color: #c8881a; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* FORM GRID — toutes les cellules ont la même hauteur via align-items:stretch */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #302c1e;
  border: 1px solid #42391f;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 1px;
  /* force uniform row heights */
  grid-auto-rows: 1fr;
}

.cell {
  background: #181610;
  padding: .9rem 1rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.lbl {
  display: block;
  font-size: clamp(.62rem, 2.2vw, .7rem);
  letter-spacing: .13em;
  text-transform: uppercase;
  color: #5a5030;
  font-weight: 300;
  margin-bottom: .45rem;
  line-height: 1.3;
}

.irow {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

/* Number inputs and select — uniform height via padding only, no min-height */
input[type=number], select {
  flex: 1;
  min-width: 0;
  height: 48px;
  background: #201e16;
  border: 1px solid #42391f;
  border-radius: 4px;
  padding: 0 .65rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: clamp(1rem, 3.8vw, 1.15rem);
  font-weight: 500;
  color: #f0c060;
  outline: none;
  -moz-appearance: textfield;
  /* prevent iOS zoom on focus */
  touch-action: manipulation;
}
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input:focus, select:focus { border-color: #c8881a; }
select option { background: #181610; color: #d8c898; }
.unit { font-size: clamp(.7rem, 2.5vw, .8rem); color: #5a5030; font-weight: 300; white-space: nowrap; flex-shrink: 0; }

/* RIDGELINE CELL — slider with visible track */
.rl-cell {
  background: #181610;
  padding: .9rem 1rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.rl-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: .5rem;
}

.rl-disp {
  font-size: clamp(.9rem, 3.2vw, 1.05rem);
  font-weight: 500;
  color: #f0c060;
  white-space: nowrap;
}

.rl-slider-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.rl-bound {
  font-size: clamp(.58rem, 2vw, .65rem);
  color: #5a5030;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Range slider — track fully visible, no min-height trick */
input[type=range] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: #201e16;
  border-radius: 3px;
  border: 1px solid #42391f;
  outline: none;
  cursor: pointer;
  /* Proper vertical centering without inflating height */
  display: block;
  margin: 0;
  padding: 0;
}
input[type=range]::-webkit-slider-container { height: 6px; }
input[type=range]::-webkit-slider-runnable-track {
  height: 6px;
  background: #201e16;
  border-radius: 3px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #c8881a;
  border: 2px solid #0e0d0a;
  margin-top: -11px; /* center thumb on 6px track */
  cursor: pointer;
}
input[type=range]::-moz-range-track {
  height: 6px;
  background: #201e16;
  border-radius: 3px;
  border: 1px solid #42391f;
}
input[type=range]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #c8881a;
  border: 2px solid #0e0d0a;
  cursor: pointer;
}

.badge { font-size: clamp(.6rem, 2vw, .68rem); letter-spacing: .08em; text-transform: uppercase; padding: .22rem .58rem; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
.ok   { background: rgba(58,122,42,.2);  color: #6ac050; border: 1px solid rgba(58,122,42,.35); }
.warn { background: rgba(168,106,8,.2);  color: #c89028; border: 1px solid rgba(168,106,8,.35); }
.bad  { background: rgba(152,32,32,.25); color: #e05050; border: 1px solid rgba(152,32,32,.35); }

/* CAMERA */
.viz { border: 1px solid #42391f; border-radius: 6px; overflow: hidden; margin-bottom: 1px; background: #080c14; position: relative; display: none; }
.viz.on { display: block; }
#vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#cv-ar { position: absolute; inset: 0; width: 100%; height: 100%; }
#cv-size { width: 100%; display: block; visibility: hidden; aspect-ratio: 16/9; }
#ar-hint { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(8,10,18,.88); border-top: 1px solid #42391f; padding: .6rem 1rem; font-size: clamp(.62rem, 2.2vw, .72rem); color: #5a5030; letter-spacing: .08em; text-transform: uppercase; text-align: center; }
#ar-hint span { color: #c8881a; }

/* RESULTS */
.res { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: #302c1e; border: 1px solid #42391f; border-radius: 6px; overflow: hidden; margin-bottom: .9rem; }
.rcard { background: #181610; padding: .9rem 1rem; border-left: 3px solid #c8881a; }
.rlabel { font-size: clamp(.6rem, 2vw, .68rem); letter-spacing: .12em; text-transform: uppercase; color: #5a5030; font-weight: 300; margin-bottom: .28rem; }
.rval { font-family: 'Teko', sans-serif; font-size: clamp(1.55rem, 5.5vw, 1.9rem); font-weight: 500; color: #f0c060; line-height: 1; }
.rsub { font-size: clamp(.55rem, 1.8vw, .62rem); color: #5a5030; margin-top: .18rem; font-weight: 300; }

.tip { background: #181610; border: 1px solid #42391f; border-left: 3px solid #c8881a; border-radius: 6px; padding: .9rem 1rem; font-size: clamp(.75rem, 2.5vw, .85rem); color: #9a8860; line-height: 1.85; font-weight: 300; }
.tip strong { color: #f0c060; font-weight: 500; }
</style>
</head>
<body>
<div class="root">

<div class="header">
  <div>
    <div class="logo">Hang<em>Mak</em></div>
    <div class="sub">Calculateur de suspension</div>
  </div>
  <button class="cam-btn" id="btn-cam" onclick="toggleCam()">
    <span class="dot"></span><span id="btn-txt">Activer caméra</span>
  </button>
</div>

<div class="form-grid">

  <!-- Longueur hamac -->
  <div class="cell">
    <span class="lbl">Longueur hamac</span>
    <div class="irow">
      <input type="number" id="hl" value="3.35" min="1" max="15" step="0.05" oninput="calc()">
      <span class="unit">m</span>
    </div>
  </div>

  <!-- Ridgeline — cellule spéciale avec layout vertical propre -->
  <div class="rl-cell">
    <div class="rl-top">
      <span class="lbl" style="margin-bottom:0">Ridgeline <span id="pct-lbl">83</span>%</span>
      <span class="rl-disp" id="rl-m">—</span>
    </div>
    <div class="rl-slider-row">
      <span class="rl-bound">80%</span>
      <input type="range" id="pct" min="80" max="85" step="1" value="83" oninput="calc()">
      <span class="rl-bound">85%</span>
    </div>
  </div>

  <!-- Distance arbres -->
  <div class="cell">
    <span class="lbl">Distance arbres</span>
    <div class="irow">
      <input type="number" id="dist" value="6.0" min="1" max="30" step="0.1" oninput="calc()">
      <span class="unit">m</span>
    </div>
  </div>

  <!-- Hauteur assise -->
  <div class="cell">
    <span class="lbl">Hauteur d'assise</span>
    <div class="irow">
      <input type="number" id="sit" value="60" min="10" max="120" step="1" oninput="calc()">
      <span class="unit">cm</span>
    </div>
  </div>

  <!-- Poids -->
  <div class="cell">
    <span class="lbl">Poids total</span>
    <div class="irow">
      <input type="number" id="wt" value="80" min="10" max="500" step="1" oninput="calc()">
      <span class="unit">kg</span>
    </div>
  </div>

  <!-- Angle -->
  <div class="cell">
    <span class="lbl">Angle depuis le sol</span>
    <div class="irow" style="flex-wrap:wrap; gap:6px;">
      <select id="ang" onchange="calc()" style="flex:1; min-width:80px;">
        <option value="15">15°</option>
        <option value="20">20°</option>
        <option value="25">25°</option>
        <option value="30" selected>30° optimal</option>
        <option value="35">35°</option>
        <option value="45">45°</option>
      </select>
      <span class="badge ok" id="badge">Optimal</span>
    </div>
  </div>

</div>

<!-- Camera -->
<div class="viz" id="viz">
  <canvas id="cv-size"></canvas>
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv-ar"></canvas>
  <div id="ar-hint">Alignez les sangles sur les <span>lignes vertes</span></div>
</div>

<!-- Results -->
<div class="res">
  <div class="rcard">
    <div class="rlabel">Hauteur ancrage</div>
    <div class="rval" id="r-h">—</div>
    <div class="rsub">sur l'arbre</div>
  </div>
  <div class="rcard">
    <div class="rlabel">Sangle</div>
    <div class="rval" id="r-s">—</div>
    <div class="rsub">par côté</div>
  </div>
  <div class="rcard">
    <div class="rlabel">Ridgeline</div>
    <div class="rval" id="r-rl">—</div>
    <div class="rsub" id="r-rl-s">83%</div>
  </div>
</div>

<div class="tip" id="tip">—</div>
</div>

<script>
const fmt = m => m >= 1 ? m.toFixed(2)+' m' : Math.round(m*100)+' cm';
let camOn=false, mediaStream=null, rafAR=null;
let G = { valid:false, hangPt:0, suspLen:0, rl:0, dist:6, angDeg:30, aRad:Math.PI/6, sitM:.6 };

function drawAR() {
  const viz = document.getElementById('viz');
  const W = viz.clientWidth || 500;
  const H = viz.clientHeight || Math.round(W*9/16);
  const cv = document.getElementById('cv-ar');
  cv.width=W; cv.height=H;
  const c = cv.getContext('2d');
  c.clearRect(0,0,W,H);
  const { aRad, angDeg, rl, dist, suspLen, hangPt, valid } = G;
  if (!valid) return;

  const fs = Math.max(13, Math.round(H*.055));
  const labelH = fs + 8;   // height of a label pill

  // ── Margins: top for anchor labels, bottom for hamac sag, sides for height label
  const padTop    = labelH + 20;      // room above anchors for sangle label
  const padBot    = H * .18;          // room below hamac ends for sag + hint bar
  const padLeft   = W * .14;          // room left for height dimension
  const padRight  = W * .06;

  // ── Horizontal layout based on rl/dist ratio ──
  const plotW   = W - padLeft - padRight;
  const rlRatio = rl / dist;
  const rlPx    = rlRatio * plotW;
  const sangHPx = (plotW - rlPx) / 2;

  const anchLx = padLeft;
  const anchRx = padLeft + plotW;
  const hamLx  = padLeft + sangHPx;
  const hamRx  = padLeft + plotW - sangHPx;

  // ── Vertical layout: anchors at top area, hamac ends in middle ──
  // We want the scene centered: anchors near top, hamac center near middle
  const dY = sangHPx * Math.tan(aRad);   // vertical rise of sangle

  // Place hamac ends so the whole scene fits with margins
  const availH  = H - padTop - padBot;
  // Scene height = dY (sangle rise) + sag
  const sagFrac = 0.12;
  const sceneH  = dY + rlPx * sagFrac;
  const scale   = Math.min(1, availH / sceneH);

  const dYpx    = dY * scale;
  const sagPx   = rlPx * sagFrac * scale;

  // Center the scene: midpoint of (anchY + hamBotY) at H/2
  const sceneHpx = dYpx + sagPx;
  const topY    = H/2 - sceneHpx/2;      // Y of anchors
  const anchY   = topY;
  const hamY    = topY + dYpx;           // Y of hamac ends
  const hamBotY = hamY + sagPx * 2;      // lowest point of sag

  // ── Draw straps ──
  function strap(ax,ay,ex,ey) {
    c.strokeStyle='rgba(80,200,60,.13)';c.lineWidth=22;c.lineCap='round';c.setLineDash([]);
    c.beginPath();c.moveTo(ax,ay);c.lineTo(ex,ey);c.stroke();
    c.strokeStyle='rgba(70,180,50,.88)';c.lineWidth=4;
    c.beginPath();c.moveTo(ax,ay);c.lineTo(ex,ey);c.stroke();
    const dx=ex-ax,dy2=ey-ay,len=Math.sqrt(dx*dx+dy2*dy2);
    const nx=-dy2/len*16,ny=dx/len*16;
    c.strokeStyle='rgba(70,180,50,.18)';c.lineWidth=1.2;c.setLineDash([5,6]);
    c.beginPath();c.moveTo(ax+nx,ay+ny);c.lineTo(ex+nx,ey+ny);c.stroke();
    c.beginPath();c.moveTo(ax-nx,ay-ny);c.lineTo(ex-nx,ey-ny);c.stroke();
    c.setLineDash([]);
  }
  strap(anchLx,anchY,hamLx,hamY);
  strap(anchRx,anchY,hamRx,hamY);

  // ── Anchor rings ──
  c.fillStyle='rgba(10,6,2,.85)';c.strokeStyle='rgba(70,180,50,.9)';c.lineWidth=2.5;
  [anchLx,anchRx].forEach(x=>{c.beginPath();c.arc(x,anchY,9,0,Math.PI*2);c.fill();c.stroke();});

  // ── Hammock ──
  const cx1l=hamLx+(hamRx-hamLx)*.35, cx2r=hamRx-(hamRx-hamLx)*.35;
  const cpy=hamY+sagPx*2;
  c.strokeStyle='rgba(28,18,4,.8)';c.lineWidth=13;c.lineCap='round';
  c.beginPath();c.moveTo(hamLx,hamY);c.bezierCurveTo(cx1l,cpy,cx2r,cpy,hamRx,hamY);c.stroke();
  c.fillStyle='rgba(55,38,10,.48)';
  c.beginPath();c.moveTo(hamLx,hamY-3);c.lineTo(hamRx,hamY-3);
  c.bezierCurveTo(cx2r,cpy,cx1l,cpy,hamLx,hamY-3);c.fill();
  c.strokeStyle='rgba(200,158,55,.85)';c.lineWidth=4.5;
  c.beginPath();c.moveTo(hamLx,hamY);c.bezierCurveTo(cx1l,cpy,cx2r,cpy,hamRx,hamY);c.stroke();

  // ── Ridgeline dashed ──
  c.setLineDash([10,7]);c.strokeStyle='rgba(100,150,215,.7)';c.lineWidth=2.2;
  c.beginPath();c.moveTo(hamLx,hamY);c.lineTo(hamRx,hamY);c.stroke();
  c.setLineDash([]);

  // ── Labels: placed ABOVE anchors (not on straps) ──
  function pill(txt, cx, cy, color) {
    const tw = c.measureText(txt).width;
    const pw = tw + 16, ph = labelH;
    c.fillStyle='rgba(6,8,14,.88)';
    c.beginPath();c.roundRect(cx-pw/2,cy-ph/2,pw,ph,4);c.fill();
    c.fillStyle=color;c.textAlign='center';
    c.fillText(txt, cx, cy+fs*.3);
  }

  c.font=`600 ${fs}px 'Teko',sans-serif`;

  // Sangle labels — above each anchor, on strap midpoint, GREEN
  const sLabelY = anchY - labelH/2 - 6;
  const lMidX = (anchLx + hamLx) / 2;
  const rMidX = (anchRx + hamRx) / 2;
  pill(suspLen.toFixed(2)+'m', lMidX, sLabelY, 'rgba(80,200,80,.95)');
  pill(suspLen.toFixed(2)+'m', rMidX, sLabelY, 'rgba(80,200,80,.95)');

  // Ridgeline label — ABOVE the ridgeline, centered, BLUE
  const rlfs = Math.max(11, Math.round(fs*.8));
  c.font=`400 ${rlfs}px monospace`;
  pill(rl.toFixed(2)+' m', W/2, hamY - labelH/2 - 8, 'rgba(100,150,215,.95)');

  // Height label — RIGHT side, outside anchRx, orange
  const dimX = anchRx - 28;
  c.strokeStyle='rgba(200,136,26,.6)';c.lineWidth=1.2;
  c.beginPath();c.moveTo(dimX,anchY);c.lineTo(dimX,hamY);c.stroke();
  [anchY,hamY].forEach(y=>{c.beginPath();c.moveTo(dimX-5,y);c.lineTo(dimX+5,y);c.stroke();});
  c.font=`600 ${Math.round(fs*.9)}px 'Teko',sans-serif`;
  c.fillStyle='rgba(200,136,26,.95)';c.textAlign='right';
  c.fillText(hangPt.toFixed(2)+'m', dimX-10, (anchY+hamY)/2+fs*.32);
}

async function toggleCam() {
  if (!camOn) {
    try {
      mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920}},audio:false});
      const vid=document.getElementById('vid');
      vid.srcObject=mediaStream; await vid.play();
      document.getElementById('viz').classList.add('on');
      document.getElementById('btn-cam').classList.add('on');
      document.getElementById('btn-txt').textContent='Arrêter caméra';
      camOn=true;
      (function loop(){drawAR();rafAR=requestAnimationFrame(loop);})();
    } catch(e) { alert('Caméra non disponible — '+e.message); }
  } else {
    if(rafAR){cancelAnimationFrame(rafAR);rafAR=null;}
    if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;}
    document.getElementById('viz').classList.remove('on');
    document.getElementById('btn-cam').classList.remove('on');
    document.getElementById('btn-txt').textContent='Activer caméra';
    camOn=false;
  }
}

function calc() {
  const hl=parseFloat(document.getElementById('hl').value)||3.35;
  const dist=parseFloat(document.getElementById('dist').value)||6;
  const sit=(parseFloat(document.getElementById('sit').value)||60)/100;
  const ang=parseFloat(document.getElementById('ang').value)||30;
  const pct=parseFloat(document.getElementById('pct').value)||83;
  const rl=hl*(pct/100), aRad=ang*Math.PI/180, valid=dist>rl+0.05;

  document.getElementById('pct-lbl').textContent=pct;
  document.getElementById('rl-m').textContent=rl.toFixed(2)+' m';
  document.getElementById('r-rl').textContent=fmt(rl);
  document.getElementById('r-rl-s').textContent=pct+'% hamac';

  if(!valid){
    document.getElementById('r-h').textContent='—';
    document.getElementById('r-s').textContent='—';
    document.getElementById('tip').innerHTML=`<strong>Erreur :</strong> ridgeline (${rl.toFixed(2)} m) > distance arbres.`;
    G={...G,valid,dist,rl,angDeg:ang,aRad,sitM:sit}; return;
  }
  const hangPt=sit+(dist/2)*Math.tan(aRad);
  const suspLen=((dist-rl)/2)/Math.cos(aRad);
  G={valid,hangPt,suspLen,rl,dist,angDeg:ang,aRad,sitM:sit};

  document.getElementById('r-h').textContent=fmt(hangPt);
  document.getElementById('r-s').textContent=fmt(suspLen);

  const b=document.getElementById('badge');
  if(ang===30){b.textContent='Optimal';b.className='badge ok';}
  else if(ang<=20){b.textContent='Danger';b.className='badge bad';}
  else if(ang>=40){b.textContent='Détendu';b.className='badge warn';}
  else{b.textContent='Correct';b.className='badge ok';}

  let tip='';
  if(ang<=20) tip=`<strong>Danger :</strong> tension très élevée à ${ang}°. Préférez 30°.`;
  else if(ang===30) tip=`Sangles à <strong>${fmt(hangPt)}</strong> sur chaque arbre · <strong>${fmt(suspLen)}</strong> par sangle · dormez en diagonale.`;
  else if(hangPt>3) tip=`Ancrage à <strong>${fmt(hangPt)}</strong> — hauteur importante. Réduisez l'angle.`;
  else tip=`Ancrage <strong>${fmt(hangPt)}</strong> · sangle <strong>${fmt(suspLen)}</strong> par côté.`;
  document.getElementById('tip').innerHTML=tip;
}

calc();
</script>
</body>
</html>
